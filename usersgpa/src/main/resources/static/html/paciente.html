<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário do Paciente</title>
    <link rel="stylesheet" href="paciente.css">
</head>
<body>
    <div class="container">
        <h1>Formulário do Paciente</h1>
        <form action="#" method="post">
            <div class="form-group">
                <label for="nome">Nome do Paciente</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="form-group">
                <label for="queixa">Queixa do Paciente</label>
                <textarea id="queixa" name="queixa" rows="4" required></textarea>
            </div>
            <h2>Informações Pessoais</h2>
            <div class="form-group">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>
            <div class="form-group">
                <label for="plano_saude">Plano de Saúde</label>
                <input type="text" id="plano_saude" name="plano_saude" required>
            </div>
            <h2>Informações Médicas</h2>
            <div class="form-group">
                <label for="sexo">Sexo</label>
                <select id="sexo" name="sexo" required>
                    <option value="">Selecione</option>
                    <option value="masculino">Masculino</option>
                    <option value="feminino">Feminino</option>
                    <option value="outro">Outro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="data_nascimento">Data de Nascimento</label>
                <input type="date" id="data_nascimento" name="data_nascimento" required>
            </div>
            <div class="form-group">
                <label for="tipo_sanguineo">Tipo Sanguíneo</label>
                <select id="tipo_sanguineo" name="tipo_sanguineo" required>
                    <option value="">Selecione</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>
            <div class="form-group">
                <label for="historico_doencas">Histórico de Doenças</label>
                <textarea id="historico_doencas" name="historico_doencas" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label for="alergias">Alergias</label>
                <textarea id="alergias" name="alergias" rows="4"></textarea>
            </div>
            <h2>Status Protocolo de Manchester</h2>
            <div class="form-group status-buttons">
                <button type="button" class="emergencia">Emergência</button>
                <button type="button" class="muito-urgente">Muito Urgente</button>
                <button type="button" class="urgente">Urgente</button>
                <button type="button" class="pouco-urgente">Pouco Urgente</button>
                <button type="button" class="nao-urgente">Não Urgente</button>
            </div>
            <div class="form-group">
                <label for="informacoes_medicas">Informações Médicas</label>
                <textarea id="informacoes_medicas" name="informacoes_medicas" rows="6"></textarea>
            </div>
            <div class="form-group">
                <button type="submit">Enviar</button>
            </div>
        </form>
    </div>
</body>
</html>
